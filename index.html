<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArabFlash · عربي فلسطيني</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cinzel:wght@400;600;900&family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   PALETTE: Terracotta · Lapis Lazuli · Gold
   Inspired by Levantine tiles, damascene art,
   mashrabiya woodwork, petra sandstone
═══════════════════════════════════════════ */
:root {
  --sand:      #f5ede0;
  --sand2:     #e8d8c0;
  --terracotta:#c0522a;
  --terra2:    #e06a3a;
  --lapis:     #1a3a5c;
  --lapis2:    #234f7a;
  --gold:      #c9933a;
  --gold2:     #e8b84b;
  --gold3:     #f5d87a;
  --teal:      #2a7a6a;
  --teal2:     #3a9a88;
  --cream:     #faf6ef;
  --ink:       #1a1208;
  --ink2:      #2e220e;
  --muted:     #8a7a60;
  --border:    #d4b896;
  --border2:   #c4a070;

  --arabic-font: 'IBM Plex Sans Arabic', 'Amiri', serif;
  --title-font:  'Cinzel', serif;
  --body-font:   'Cormorant Garamond', serif;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--body-font);
  font-size: 18px;
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* ── BACKGROUND: Geometric mashrabiya pattern ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-color: var(--cream);
  background-image:
    /* Eight-pointed star lattice */
    repeating-conic-gradient(
      from 22.5deg at 50% 50%,
      rgba(201,147,58,.07) 0deg 45deg,
      transparent 45deg 90deg
    ),
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 39px,
      rgba(201,147,58,.06) 39px,
      rgba(201,147,58,.06) 40px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 39px,
      rgba(201,147,58,.06) 39px,
      rgba(201,147,58,.06) 40px
    );
  background-size: 80px 80px, 40px 40px, 40px 40px;
  pointer-events: none;
}

/* Decorative top arch */
body::after {
  content: '';
  position: fixed; top: 0; left: 0; right: 0;
  height: 6px; z-index: 100;
  background: linear-gradient(90deg,
    var(--terracotta), var(--gold), var(--lapis), var(--teal2), var(--gold), var(--terracotta));
}

/* ── LAYOUT ── */
#app {
  position: relative; z-index: 1;
  max-width: 860px; margin: 0 auto;
  padding: 0 20px 40px;
}

/* ── HEADER ── */
header {
  text-align: center;
  padding: 36px 0 28px;
  position: relative;
}

/* Decorative arch above title */
.arch-decoration {
  width: 180px; height: 90px; margin: 0 auto 12px;
  position: relative;
  overflow: visible;
}
.arch-decoration svg { width:100%; height:100%; }

.logo-title {
  font-family: var(--title-font);
  font-size: 2.6rem;
  font-weight: 900;
  letter-spacing: 4px;
  color: var(--lapis);
  text-transform: uppercase;
  line-height: 1;
  margin-bottom: 4px;
}
.logo-title em {
  font-style: normal;
  color: var(--terracotta);
}

.logo-arabic {
  font-family: var(--arabic-font);
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--gold);
  direction: rtl;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.logo-sub {
  font-family: var(--body-font);
  font-style: italic;
  font-size: .95rem;
  color: var(--muted);
  letter-spacing: 1px;
}

/* Horizontal divider with star motif */
.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0;
}
.divider-line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
}
.divider-star {
  color: var(--gold); font-size: 1.1rem;
  line-height: 1;
}

/* ── CONTROLS BAR ── */
.top-controls {
  display: flex; flex-wrap: wrap; gap: 10px;
  align-items: center; justify-content: space-between;
  margin-bottom: 20px;
}

/* Search */
.search-wrap {
  flex: 1; min-width: 220px;
  position: relative;
}
.search-box {
  display: flex; align-items: center; gap: 8px;
  background: white;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  padding: 9px 14px;
  box-shadow: 0 2px 8px rgba(26,18,8,.08);
  transition: border-color .2s, box-shadow .2s;
}
.search-box:focus-within {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(201,147,58,.15), 0 2px 8px rgba(26,18,8,.08);
}
.search-box input {
  background: none; border: none; outline: none;
  font-family: var(--body-font); font-size: 1rem;
  color: var(--ink); flex: 1; min-width: 0;
}
.search-box input::placeholder { color: var(--muted); font-style: italic; }
.search-icon { color: var(--muted); font-size: .9rem; flex-shrink:0; }
.search-clear {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: .8rem; padding: 0;
  line-height:1; flex-shrink:0;
}
.search-clear:hover { color: var(--terracotta); }

/* Right-side controls */
.right-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

select, .ctrl-btn {
  font-family: var(--body-font);
  font-size: .95rem;
  background: white;
  border: 1.5px solid var(--border2);
  color: var(--ink2);
  padding: 8px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .2s;
  box-shadow: 0 2px 6px rgba(26,18,8,.06);
}
select:hover, .ctrl-btn:hover {
  border-color: var(--gold);
  background: var(--sand);
}
select:focus, .ctrl-btn:focus { outline: none; border-color: var(--gold); }

.ctrl-btn.primary {
  background: var(--terracotta);
  color: var(--cream); border-color: var(--terracotta);
  font-weight: 600; letter-spacing: .5px;
}
.ctrl-btn.primary:hover {
  background: var(--terra2); border-color: var(--terra2);
}

/* ── SEARCH RESULTS ── */
.search-results {
  display: none;
  background: white;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  max-height: 260px; overflow-y: auto;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(26,18,8,.15);
}
.sr-item {
  display: flex; gap: 14px; align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid var(--sand2);
  cursor: pointer; transition: background .15s;
}
.sr-item:last-child { border-bottom: none; }
.sr-item:hover { background: var(--sand); }
.sr-ar {
  font-family: var(--arabic-font);
  font-size: 1.3rem; font-weight: 600;
  color: var(--lapis); direction: rtl;
  min-width: 90px; text-align: right;
}
.sr-info { flex: 1; }
.sr-franco { font-size: .9rem; color: var(--ink2); font-style: italic; }
.sr-it { font-size: .8rem; color: var(--muted); margin-top: 2px; }

/* ── MODE + SHUFFLE ROW ── */
.mode-row {
  display: flex; flex-wrap: wrap; gap: 8px;
  align-items: center; margin-bottom: 18px;
}
.row-label {
  font-family: var(--title-font);
  font-size: .7rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
  margin-right: 4px;
}
.mode-btn {
  font-family: var(--body-font);
  font-size: .9rem;
  padding: 6px 16px; border-radius: 3px;
  border: 1.5px solid var(--border);
  background: white; color: var(--muted);
  cursor: pointer; transition: all .2s;
}
.mode-btn:hover { border-color: var(--lapis); color: var(--lapis); }
.mode-btn.active {
  background: var(--lapis); border-color: var(--lapis);
  color: var(--gold2); font-weight: 600;
}
.mode-btn.active-terra {
  background: var(--terracotta); border-color: var(--terracotta);
  color: var(--cream);
}

/* ── CATEGORIES ── */
.section-title {
  font-family: var(--title-font);
  font-size: .75rem; letter-spacing: 3px;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-title::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

.cat-list {
  display: flex; flex-direction: column; gap: 0;
  background: white;
  border: 1.5px solid var(--border2);
  border-radius: 6px;
  overflow: hidden;
  box-shadow: 0 4px 16px rgba(26,18,8,.08);
  margin-bottom: 24px;
}

.cat-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px;
  border-bottom: 1px solid var(--sand2);
  cursor: pointer;
  transition: background .15s, color .15s;
  position: relative;
}
.cat-item:last-child { border-bottom: none; }
.cat-item:hover { background: var(--sand); }

.cat-item.active {
  background: linear-gradient(135deg, var(--lapis) 0%, var(--lapis2) 100%);
  color: white;
}
.cat-item.active .cat-icon { color: var(--gold2); }
.cat-item.active .cat-count { background: rgba(255,255,255,.15); color: white; }
.cat-item.active .cat-label { color: white; }
.cat-item.active .cat-bar-fill { background: rgba(255,255,255,.3); }

.cat-item.all-item.active {
  background: linear-gradient(135deg, var(--terracotta) 0%, var(--terra2) 100%);
}

.cat-icon {
  font-size: 1.3rem; width: 28px; text-align: center;
  flex-shrink: 0; color: var(--gold);
}

.cat-label {
  font-family: var(--body-font);
  font-size: 1.15rem; font-weight: 600;
  color: var(--ink2); flex: 1;
  letter-spacing: .3px;
}

.cat-count {
  font-family: var(--title-font);
  font-size: .7rem; letter-spacing: 1px;
  background: var(--sand2);
  color: var(--muted);
  padding: 3px 10px;
  border-radius: 20px;
  min-width: 40px; text-align: center;
}

/* Active indicator stripe */
.cat-item.active::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--gold2);
}

/* ── STATS ROW ── */
.stats-row {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 20px; flex-wrap: wrap;
}
.stat-box {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 4px;
  padding: 8px 16px;
  text-align: center;
  box-shadow: 0 2px 6px rgba(26,18,8,.06);
}
.stat-num {
  font-family: var(--title-font);
  font-size: 1.4rem; font-weight: 900;
  color: var(--lapis); display: block;
}
.stat-num.correct { color: var(--teal); }
.stat-num.wrong { color: var(--terracotta); }
.stat-lbl {
  font-size: .7rem; letter-spacing: 1px;
  text-transform: uppercase; color: var(--muted);
  font-family: var(--title-font);
}

.progress-wrap { flex: 1; min-width: 120px; }
.progress-label {
  font-size: .7rem; color: var(--muted);
  font-family: var(--title-font); letter-spacing: 1px;
  margin-bottom: 4px; text-transform: uppercase;
}
.progress-track {
  height: 6px; background: var(--sand2);
  border-radius: 3px; overflow: hidden;
}
.progress-fill {
  height: 100%; border-radius: 3px;
  background: linear-gradient(90deg, var(--lapis), var(--gold));
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* ── FLASH CARD ── */
.card-stage {
  perspective: 1200px;
  margin-bottom: 20px;
}

.flashcard {
  width: 100%; height: 300px;
  position: relative; cursor: pointer;
  transform-style: preserve-3d;
  transition: transform .55s cubic-bezier(.4,0,.2,1);
}
.flashcard.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 8px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 36px;
  text-align: center;
  border: 2px solid var(--border2);
  overflow: hidden;
}

/* FRONT: sandstone, geometric border */
.card-front {
  background: linear-gradient(160deg, #faf3e8 0%, #f0e4cc 100%);
  box-shadow: 0 12px 40px rgba(26,18,8,.18), 0 2px 8px rgba(26,18,8,.1);
}

/* Geometric corner ornaments via ::before/::after on card */
.card-front::before {
  content: '';
  position: absolute; inset: 8px;
  border: 1px solid rgba(201,147,58,.3);
  border-radius: 4px;
  pointer-events: none;
}

/* Corner stars */
.card-front::after {
  content: '✦';
  position: absolute; top: 14px; right: 18px;
  font-size: .8rem; color: rgba(201,147,58,.5);
  pointer-events: none;
}

/* BACK: deep lapis */
.card-back {
  transform: rotateY(180deg);
  background: linear-gradient(160deg, var(--lapis) 0%, #0f2540 100%);
  border-color: var(--lapis2);
  box-shadow: 0 12px 40px rgba(26,18,8,.3);
}
.card-back::before {
  content: '';
  position: absolute; inset: 8px;
  border: 1px solid rgba(201,147,58,.25);
  border-radius: 4px;
  pointer-events: none;
}
.card-back::after {
  content: '✦';
  position: absolute; top: 14px; right: 18px;
  font-size: .8rem; color: rgba(201,147,58,.4);
  pointer-events: none;
}

/* Corner star bottom-left */
.card-face .corner-bl {
  position: absolute; bottom: 14px; left: 18px;
  font-size: .8rem; color: rgba(201,147,58,.4);
  pointer-events: none;
}

.card-chip {
  font-family: var(--title-font);
  font-size: .6rem; letter-spacing: 3px;
  text-transform: uppercase;
  padding: 4px 14px; border-radius: 20px;
  margin-bottom: 18px;
}
.card-front .card-chip {
  background: var(--lapis);
  color: var(--gold2);
  border: 1px solid var(--lapis2);
}
.card-back .card-chip {
  background: rgba(201,147,58,.15);
  color: var(--gold2);
  border: 1px solid rgba(201,147,58,.3);
}

.main-arabic {
  font-family: var(--arabic-font);
  font-size: 3.4rem; font-weight: 700;
  color: var(--lapis);
  direction: rtl; line-height: 1.2;
  margin-bottom: 8px;
}
.card-back .main-arabic { color: var(--gold2); }

.main-franco {
  font-family: var(--body-font);
  font-size: 1.5rem; font-style: italic;
  color: var(--ink2);
  margin-bottom: 6px;
}
.card-back .main-franco { color: var(--sand2); }

.main-translation {
  font-family: var(--body-font);
  font-size: 1.15rem; color: var(--teal);
  margin-bottom: 4px;
}
.card-back .main-translation { color: var(--teal2); }

.trans-secondary {
  font-family: var(--body-font);
  font-size: .9rem; color: var(--muted);
  font-style: italic;
}
.card-back .trans-secondary { color: rgba(232,184,75,.6); }

.card-hint {
  position: absolute; bottom: 14px;
  font-family: var(--title-font);
  font-size: .58rem; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted);
}
.card-back .card-hint { color: rgba(201,147,58,.4); }

.cat-tags {
  position: absolute; top: 14px; left: 16px;
  display: flex; flex-wrap: wrap; gap: 4px; max-width: 60%;
}
.cat-tag {
  font-size: .58rem; letter-spacing: .5px; text-transform: uppercase;
  padding: 2px 8px; border-radius: 2px;
  background: rgba(26,58,92,.08); color: var(--lapis);
  border: 1px solid rgba(26,58,92,.15);
  font-family: var(--title-font);
}
.card-back .cat-tag {
  background: rgba(201,147,58,.1); color: var(--gold2);
  border-color: rgba(201,147,58,.2);
}

/* ── NAV ROW ── */
.nav-row {
  display: flex; gap: 12px; align-items: center;
  justify-content: center; margin-bottom: 16px;
}

.nav-btn {
  width: 52px; height: 52px;
  border-radius: 50%; border: 2px solid var(--border2);
  background: white; color: var(--ink2);
  font-size: 1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s;
  box-shadow: 0 3px 10px rgba(26,18,8,.1);
  font-family: serif;
}
.nav-btn:hover {
  border-color: var(--lapis); color: var(--lapis);
  box-shadow: 0 4px 14px rgba(26,58,92,.2);
  transform: translateY(-1px);
}

.flip-btn {
  padding: 12px 40px; border-radius: 4px;
  font-family: var(--title-font);
  font-size: .85rem; letter-spacing: 3px;
  text-transform: uppercase;
  background: white; color: var(--lapis);
  border: 2px solid var(--lapis);
  cursor: pointer; transition: all .2s;
  box-shadow: 0 3px 10px rgba(26,18,8,.1);
}
.flip-btn:hover {
  background: var(--lapis); color: var(--gold2);
  box-shadow: 0 6px 20px rgba(26,58,92,.3);
}

/* ── RESULT BUTTONS ── */
.result-row {
  display: flex; gap: 10px; justify-content: center;
  margin-bottom: 28px; flex-wrap: wrap;
}
.result-btn {
  font-family: var(--body-font);
  font-size: 1rem; padding: 10px 24px;
  border-radius: 4px; cursor: pointer;
  transition: all .2s; letter-spacing: .3px;
  border: 1.5px solid;
  box-shadow: 0 2px 8px rgba(26,18,8,.08);
}
.result-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(26,18,8,.15); }
.result-btn.correct {
  color: var(--teal); border-color: var(--teal); background: white;
}
.result-btn.correct:hover { background: var(--teal); color: white; }
.result-btn.wrong {
  color: var(--terracotta); border-color: var(--terracotta); background: white;
}
.result-btn.wrong:hover { background: var(--terracotta); color: white; }
.result-btn.skip {
  color: var(--muted); border-color: var(--border2); background: white;
}
.result-btn.skip:hover { background: var(--sand); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: var(--sand); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--gold); }

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
@keyframes spinStar {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

header { animation: fadeUp .6s ease both; }
.top-controls { animation: fadeUp .6s .1s ease both; }
.cat-list { animation: fadeUp .6s .2s ease both; }
.card-stage { animation: fadeUp .6s .3s ease both; }

/* ── EMPTY STATE ── */
.empty-state {
  height: 300px; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 12px; color: var(--muted); text-align: center;
  background: linear-gradient(160deg, #faf3e8 0%, #f0e4cc 100%);
  border: 2px solid var(--border2); border-radius: 8px;
  font-family: var(--body-font); font-style: italic;
}
.empty-icon { font-size: 2.5rem; opacity: .5; }

/* Keyboard hint */
.kbd-hint {
  text-align: center;
  font-family: var(--title-font);
  font-size: .6rem; letter-spacing: 2px; text-transform: uppercase;
  color: var(--muted); margin-top: 8px;
}
kbd {
  background: white; border: 1px solid var(--border2);
  border-radius: 3px; padding: 1px 5px;
  font-family: monospace; font-size: .75rem;
  color: var(--ink2);
  box-shadow: 0 1px 0 var(--border2);
}
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header>
    <!-- Geometric arch SVG -->
    <div class="arch-decoration">
      <svg viewBox="0 0 180 90" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Keyhole arch -->
        <path d="M20 88 L20 45 Q20 8 90 8 Q160 8 160 45 L160 88" stroke="#c9933a" stroke-width="2" fill="none" opacity=".6"/>
        <path d="M36 88 L36 50 Q36 24 90 24 Q144 24 144 50 L144 88" stroke="#1a3a5c" stroke-width="1" fill="none" opacity=".4"/>
        <!-- Muqarnas-style decorative points -->
        <path d="M55 88 L55 60 Q55 46 90 46 Q125 46 125 60 L125 88" stroke="#c9933a" stroke-width="1.5" fill="none" opacity=".5"/>
        <!-- Eight-pointed star center -->
        <g transform="translate(90,46)" opacity=".8">
          <polygon points="0,-10 2.6,-2.6 10,0 2.6,2.6 0,10 -2.6,2.6 -10,0 -2.6,-2.6" fill="#c9933a"/>
          <polygon points="0,-10 2.6,-2.6 10,0 2.6,2.6 0,10 -2.6,2.6 -10,0 -2.6,-2.6" fill="#e8b84b" transform="rotate(22.5)"/>
        </g>
        <!-- Small decorative stars -->
        <g opacity=".5">
          <circle cx="20" cy="88" r="3" fill="#c9933a"/>
          <circle cx="160" cy="88" r="3" fill="#c9933a"/>

function translate(italian, lang) {
  const it = italian.toLowerCase();
  const map = lang==='es' ? ES : PT;
  for (const [k,v] of Object.entries(map)) {
    if (it.includes(k)) return v;
  }
  return '';
}

// ═══════════════ CATEGORIES ═══════════════
const CATS = [
  {id:'all',      icon:'✦',  label:'All Words'},
  {id:'food',     icon:'🍎', label:'Food & Drink'},
  {id:'home',     icon:'🏠', label:'Home'},
  {id:'domestic', icon:'🪴', label:'Domestic Life'},
  {id:'family',   icon:'👨‍👩‍👧', label:'Family'},
  {id:'clothing', icon:'👗', label:'Clothing'},
  {id:'school',   icon:'📚', label:'School & Education'},
  {id:'work',     icon:'💼', label:'Work'},
  {id:'professions',icon:'👷',label:'Professions'},
  {id:'time',     icon:'⏰', label:'Time'},
  {id:'colors',   icon:'🎨', label:'Colors'},
  {id:'numbers',  icon:'🔢', label:'Numbers & Math'},
  {id:'human',    icon:'👤', label:'Human Being'},
  {id:'greetings',icon:'✋', label:'Greetings & Expressions'},
  {id:'religion', icon:'🕍', label:'Religion & Spirituality'},
  {id:'directions',icon:'🧭',label:'Directions & Location'},
  {id:'animals',  icon:'🐾', label:'Animals'},
  {id:'nature',   icon:'🌿', label:'Nature & Weather'},
  {id:'places',   icon:'📍', label:'Places & Geography'},
  {id:'society',  icon:'🏛️', label:'Society & Politics'},
  {id:'description',icon:'📝',label:'Description & Adjectives'},
  {id:'objects',  icon:'📦', label:'Objects'},
  {id:'grammar',  icon:'✏️', label:'Grammar'},
  {id:'general',  icon:'⚡', label:'General'},
];

// Count per category
const catCounts = {};
VOCAB.forEach(c => c.cats.forEach(t => { catCounts[t]=(catCounts[t]||0)+1; }));
catCounts.all = VOCAB.filter(c=>c.ar).length;

// ═══════════════ STATE ═══════════════
const S = {
  lang:'it', mode:'ar-to-it', cat:'all',
  deck:[], idx:0, flipped:false,
  correct:0, wrong:0, shuffled:false,
};

// ═══════════════ INIT ═══════════════
function init() {
  buildCatList();
  buildDeck();
  showCard();
}

function buildCatList() {
  const el = document.getElementById('catList');
  el.innerHTML = CATS.map(c => `
    <div class="cat-item${c.id==='all'?' all-item':''}${c.id===S.cat?' active':''}"
         id="cat_${c.id}" onclick="selectCat('${c.id}')">
      <span class="cat-icon">${c.icon}</span>
      <span class="cat-label">${c.label}</span>
      <span class="cat-count">${catCounts[c.id]||0}</span>
    </div>
  `).join('');
}

function shuffle(arr) {
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function buildDeck() {
  let d = VOCAB.filter(c=>c.ar);
  if (S.cat!=='all') d = d.filter(c=>c.cats.includes(S.cat));
  if (S.shuffled) d = shuffle([...d]);
  S.deck=d; S.idx=0; S.correct=0; S.wrong=0;
  updateStats();
}

// ═══════════════ RENDER CARD ═══════════════
function catTags(cats, back=false) {
  return (cats||[]).slice(0,3).map(id=>{
    const c=CATS.find(x=>x.id===id);
    return `<span class="cat-tag">${c?c.label:id}</span>`;
  }).join('');
}

function showCard() {
  const card = S.deck[S.idx];
  S.flipped=false;
  document.getElementById('flashcard').classList.remove('flipped');

  if (!card) {
    document.getElementById('cardFront').innerHTML=`
      <div class="empty-state">
        <div class="empty-icon">✦</div>
        <div>No cards in this category</div>
      </div>`;
    document.getElementById('cardBack').innerHTML='';
    return;
  }

  const lang = S.lang;
  const trans = translate(card.i, lang);
  const flag = lang==='it'?'🇮🇹':lang==='es'?'🇪🇸':'🇧🇷';
  const langName = lang==='it'?'ITALIANO':lang==='es'?'ESPAÑOL':'PORTUGUÊS';
  const transLine = (lang!=='it' && trans)
    ? `<div class="trans-secondary">${flag} ${trans}</div>` : '';

  const tags = catTags(card.cats);
  const tagsFront = `<div class="cat-tags">${tags}</div>`;
  const cornerBL = `<div class="corner-bl">✦</div>`;

  if (S.mode==='ar-to-it') {
    document.getElementById('cardFront').innerHTML=`
      ${tagsFront}
      <div class="card-chip">Arabic · عربي</div>
      <div class="main-arabic" dir="rtl">${card.ar}</div>
      <div class="card-hint">Tap to reveal translation</div>
      ${cornerBL}`;
    document.getElementById('cardBack').innerHTML=`
      <div class="cat-tags">${catTags(card.cats,true)}</div>
      <div class="card-chip">Translation</div>
      <div class="main-franco">${card.f}</div>
      <div class="main-translation">🇮🇹 ${card.i}</div>
      ${transLine}
      <div class="card-hint">Tap to flip back</div>
      ${cornerBL}`;
  } else if (S.mode==='it-to-ar') {
    const frontText = (lang!=='it' && trans) ? trans : card.i;
    document.getElementById('cardFront').innerHTML=`
      ${tagsFront}
      <div class="card-chip">${flag} ${langName}</div>
      <div class="main-franco" style="font-size:1.7rem">${frontText}</div>
      <div class="card-hint">Tap to reveal Arabic</div>
      ${cornerBL}`;
    document.getElementById('cardBack').innerHTML=`
      <div class="cat-tags">${catTags(card.cats,true)}</div>
      <div class="card-chip">Arabic · عربي</div>
      <div class="main-arabic" dir="rtl">${card.ar}</div>
      <div class="main-franco" style="font-size:.95rem;opacity:.6">${card.f}</div>
      <div class="card-hint">Tap to flip back</div>
      ${cornerBL}`;
  } else {
    document.getElementById('cardFront').innerHTML=`
      ${tagsFront}
      <div class="card-chip">Franco Arabic</div>
      <div class="main-franco" style="font-size:1.7rem">${card.f}</div>
      <div class="card-hint">Tap to reveal Arabic script</div>
      ${cornerBL}`;
    document.getElementById('cardBack').innerHTML=`
      <div class="cat-tags">${catTags(card.cats,true)}</div>
      <div class="card-chip">Arabic · عربي</div>
      <div class="main-arabic" dir="rtl">${card.ar}</div>
      <div class="main-translation">🇮🇹 ${card.i}</div>
      ${transLine}
      <div class="card-hint">Tap to flip back</div>
      ${cornerBL}`;
  }
  updateStats();
}

function flipCard() {
  S.flipped=!S.flipped;
  document.getElementById('flashcard').classList.toggle('flipped',S.flipped);
}
function nextCard() {
  if(S.idx<S.deck.length-1) S.idx++;
  showCard();
}
function prevCard() {
  if(S.idx>0) S.idx--;
  showCard();
}
function markResult(ok) {
  if(ok) S.correct++; else S.wrong++;
  updateStats(); nextCard();
}
function updateStats() {
  const t=S.deck.length, n=t?S.idx+1:0;
  document.getElementById('statIdx').textContent=n||'—';
  document.getElementById('statTotal').textContent=t||'—';
  document.getElementById('statCorrect').textContent=S.correct;
  document.getElementById('statWrong').textContent=S.wrong;
  document.getElementById('progressFill').style.width=(t?(S.idx/t*100):0)+'%';
}

// ═══════════════ CONTROLS ═══════════════
function selectCat(id) {
  S.cat=id;
  document.querySelectorAll('.cat-item').forEach(el=>el.classList.remove('active'));
  document.getElementById('cat_'+id)?.classList.add('active');
  buildDeck(); showCard();
}
function setMode(m) {
  S.mode=m;
  ['modeAR','modeIT','modeFR'].forEach(id=>document.getElementById(id).classList.remove('active'));
  const map={'ar-to-it':'modeAR','it-to-ar':'modeIT','fr-to-ar':'modeFR'};
  document.getElementById(map[m])?.classList.add('active');
  showCard();
}
function toggleShuffle(on) {
  S.shuffled=on;
  document.getElementById('shuffleOn').classList.toggle('active',on);
  document.getElementById('shuffleOff').classList.toggle('active-terra',!on);
  document.getElementById('shuffleOff').classList.toggle('active',false);
  buildDeck(); showCard();
}
function shuffleDeck() {
  S.deck=shuffle([...S.deck]); S.idx=0; showCard();
}
document.getElementById('langSelect').addEventListener('change',e=>{S.lang=e.target.value;showCard();});

// ═══════════════ SEARCH ═══════════════
let stimer;
function onSearch(v) {
  clearTimeout(stimer);
  if (!v.trim()) { document.getElementById('searchResults').style.display='none'; return; }
  stimer=setTimeout(()=>doSearch(v.trim()),200);
}
function doSearch(q) {
  const ql=q.toLowerCase();
  const res=VOCAB.filter(c=>(
    c.f.toLowerCase().includes(ql)||
    c.i.toLowerCase().includes(ql)||
    c.ar.includes(q)||
    translate(c.i,'es').toLowerCase().includes(ql)||
    translate(c.i,'pt').toLowerCase().includes(ql)
  )).slice(0,18);
  const panel=document.getElementById('searchResults');
  if(!res.length){
    panel.style.display='block';
    panel.innerHTML='<div style="padding:18px;text-align:center;color:var(--muted);font-style:italic;font-family:var(--body-font)">No results found</div>';
    return;
  }
  panel.style.display='block';
  panel.innerHTML=res.map(c=>`
    <div class="sr-item" onclick="jumpTo(${VOCAB.indexOf(c)})">
      <div class="sr-ar" dir="rtl">${c.ar||'—'}</div>
      <div class="sr-info">
        <div class="sr-franco">${c.f}</div>
        <div class="sr-it">${c.i}</div>
      </div>
    </div>`).join('');
}
function jumpTo(vi) {
  const card=VOCAB[vi];
  const di=S.deck.indexOf(card);
  if(di>=0){S.idx=di;}
  else{S.deck=[card];S.idx=0;}
  clearSearch(); showCard();
}
function clearSearch() {
  document.getElementById('searchInput').value='';
  document.getElementById('searchResults').style.display='none';
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(document.activeElement.tagName==='INPUT') return;
  if(e.key===' '||e.key==='Enter'){e.preventDefault();flipCard();}
  else if(e.key==='ArrowRight'||e.key==='l') nextCard();
  else if(e.key==='ArrowLeft'||e.key==='h') prevCard();
  else if(e.key==='y') markResult(true);
  else if(e.key==='n') markResult(false);
});

init();
</script>
</body>
</html>
